description: >-
  CAT is the brand name and ticker symbol for Caterpillar Inc. (NYSE: CAT),
  the world's leading manufacturer of construction and mining equipment,
  off-highway diesel and natural gas engines, industrial gas turbines, and
  diesel-electric locomotives. Cat Digital publishes a public API catalog at
  digital.cat.com that exposes fleet, asset, telematics, and fuel data APIs
  built on the Cat Connect and VisionLink platforms.
